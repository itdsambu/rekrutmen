name: rekrutmen

services:
  nginx:
    image: openresty/openresty:alpine
    container_name: rekrutmen-nginx
    restart: always
    ports:
      - "8082:80"
    volumes:
      - ./src/rekrutmen:/var/www/html/rekrutmen
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /media/foto_kar:/media/foto_kar
      - /media/forqsd:/media/forqsd
      - /media/fortrainingpsn:/media/fortrainingpsn
    depends_on:
      - app83
    networks:
      - appnet
      - proxy-net

  app83:
    build:
      context: .
      dockerfile: ./docker/php83/Dockerfile
    image: rekrutmen-app83
    container_name: rekrutmen-php83
    restart: always
    working_dir: /var/www/html/rekrutmen
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - ./src/rekrutmen:/var/www/html/rekrutmen
      - ./docker/php83/php.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
      - ./docker/php83/zz-custom-pool.conf:/usr/local/etc/php-fpm.d/zz-custom-pool.conf:ro
      - /media/foto_kar:/media/foto_kar
      - /media/forqsd:/media/forqsd
      - /media/fortrainingpsn:/media/fortrainingpsn
      - /media/forqsd/rekrutmen/berkas:/media/forqsd/rekrutmen/berkas
      - /media/forqsd/rekrutmen/bypass:/media/forqsd/rekrutmen/bypass
      - /media/forqsd/rekrutmen/calonkandidat:/media/forqsd/rekrutmen/calonkandidat
      - /media/forqsd/rekrutmen/foto:/media/forqsd/rekrutmen/foto
      - /media/forqsd/rekrutmen/fotoProfil:/media/forqsd/rekrutmen/fotoProfil
      - /media/forqsd/rekrutmen/idealkarytk:/media/forqsd/rekrutmen/idealkarytk
      - /media/forqsd/rekrutmen/ttd:/media/forqsd/rekrutmen/ttd
      - /media/forqsd/rekrutmen/ttdbynik:/media/forqsd/rekrutmen/ttdbynik
      - /media/forqsd/rekrutmen/ttdpgd:/media/forqsd/rekrutmen/ttdpgd
    environment:
      TZ: Asia/Jakarta
      CI_ENV: ${CI_ENV}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      DB_HOST_1: ${DB_HOST_1}
      DB_PORT_1: ${DB_PORT_1}
      DB_USER_1: ${DB_USER_1}
      DB_PASS_1: ${DB_PASS_1}
      DB_NAME_1: ${DB_NAME_1}
      DB_HOST_2: ${DB_HOST_2}
      DB_PORT_2: ${DB_PORT_2}
      DB_USER_2: ${DB_USER_2}
      DB_PASS_2: ${DB_PASS_2}
      DB_NAME_2: ${DB_NAME_2}
      DB_HOST_3: ${DB_HOST_3}
      DB_PORT_3: ${DB_PORT_3}
      DB_USER_3: ${DB_USER_3}
      DB_PASS_3: ${DB_PASS_3}
      DB_NAME_3: ${DB_NAME_3}
      DB_HOST_4: ${DB_HOST_4}
      DB_PORT_4: ${DB_PORT_4}
      DB_USER_4: ${DB_USER_4}
      DB_PASS_4: ${DB_PASS_4}
      DB_NAME_4: ${DB_NAME_4}
      DB_HOST_5: ${DB_HOST_5}
      DB_PORT_5: ${DB_PORT_5}
      DB_USER_5: ${DB_USER_5}
      DB_PASS_5: ${DB_PASS_5}
      DB_NAME_5: ${DB_NAME_5}
      DB_HOST_6: ${DB_HOST_6}
      DB_PORT_6: ${DB_PORT_6}
      DB_USER_6: ${DB_USER_6}
      DB_PASS_6: ${DB_PASS_6}
      DB_NAME_6: ${DB_NAME_6}
      DB_HOST_7: ${DB_HOST_7}
      DB_PORT_7: ${DB_PORT_7}
      DB_USER_7: ${DB_USER_7}
      DB_PASS_7: ${DB_PASS_7}
      DB_NAME_7: ${DB_NAME_7}
      DB_HOST_8: ${DB_HOST_8}
      DB_PORT_8: ${DB_PORT_8}
      DB_USER_8: ${DB_USER_8}
      DB_PASS_8: ${DB_PASS_8}
      DB_NAME_8: ${DB_NAME_8}
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 2G
    # ============================================
    # Kernel tuning untuk high-concurrency
    # ============================================
    sysctls:
      - net.core.somaxconn=1024
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - appnet

networks:
  appnet:
  proxy-net:
    external: true
