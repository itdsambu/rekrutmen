name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Bisa trigger manual dari GitHub UI

jobs:
  deploy:
    name: Deploy via SSH + Docker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout source code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup SSH agent ───────────────────────────────────────────────
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # ── 3. Add server ke known_hosts (hindari prompt "yes/no") ──────────
      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT || '22' }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # ── 4. Pull latest code di server ───────────────────────────────────
      - name: Pull latest code on server
        run: |
          ssh -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && git pull origin $(git symbolic-ref --short HEAD)"

      # ── 5. Composer install (skip dev dependencies di production) ────────
      - name: Run composer install on server
        run: |
          ssh -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ${{ secrets.DEPLOY_PATH }}/src/rekrutmen
            if [ -f composer.json ]; then
              composer install \
                --no-dev \
                --optimize-autoloader \
                --no-interaction \
                --prefer-dist
              echo "✅ Composer install selesai"
            else
              echo "⚠️  composer.json tidak ditemukan, skip"
            fi
          EOF

      # ── 6. Build & recreate Docker containers ───────────────────────────
      - name: Docker build & up (production)
        run: |
          ssh -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ${{ secrets.DEPLOY_PATH }}

            # Gunakan docker-compose.prod.yml jika ada
            COMPOSE_FILE="docker-compose.yml"
            if [ -f "docker-compose.prod.yml" ]; then
              COMPOSE_FILE="docker-compose.prod.yml"
              echo "📦 Menggunakan $COMPOSE_FILE"
            fi

            docker compose -f $COMPOSE_FILE pull --quiet || true
            docker compose -f $COMPOSE_FILE build --no-cache
            docker compose -f $COMPOSE_FILE up -d --remove-orphans

            echo "✅ Docker containers berhasil dijalankan"
          EOF

      # ── 7. Restart PHP-FPM & Nginx di dalam container ───────────────────
      - name: Restart PHP-FPM & Nginx
        run: |
          ssh -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ${{ secrets.DEPLOY_PATH }}

            # Deteksi nama container dari docker-compose
            PHP83_CONTAINER=$(docker compose ps -q php83 2>/dev/null || docker ps --filter "name=php83" -q | head -1)
            PHP74_CONTAINER=$(docker compose ps -q php74 2>/dev/null || docker ps --filter "name=php74" -q | head -1)
            NGINX_CONTAINER=$(docker compose ps -q nginx 2>/dev/null || docker ps --filter "name=nginx" -q | head -1)

            # Restart PHP-FPM
            if [ -n "$PHP83_CONTAINER" ]; then
              docker exec $PHP83_CONTAINER sh -c "kill -USR2 1 2>/dev/null || pkill -USR2 php-fpm || true"
              echo "✅ PHP 8.3 FPM restarted"
            fi

            if [ -n "$PHP74_CONTAINER" ]; then
              docker exec $PHP74_CONTAINER sh -c "kill -USR2 1 2>/dev/null || pkill -USR2 php-fpm || true"
              echo "✅ PHP 7.4 FPM restarted"
            fi

            # Reload Nginx (graceful, tanpa downtime)
            if [ -n "$NGINX_CONTAINER" ]; then
              docker exec $NGINX_CONTAINER nginx -s reload
              echo "✅ Nginx reloaded"
            fi
          EOF

      # ── 8. Health check ──────────────────────────────────────────────────
      - name: Health check
        run: |
          ssh -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ${{ secrets.DEPLOY_PATH }}
            
            # Cek semua container running
            RUNNING=$(docker compose ps --filter "status=running" --quiet | wc -l)
            TOTAL=$(docker compose ps --quiet | wc -l)
            
            echo "🐳 Container running: $RUNNING / $TOTAL"
            docker compose ps

            if [ "$RUNNING" -lt "$TOTAL" ]; then
              echo "❌ Ada container yang tidak running!"
              exit 1
            fi

            echo "✅ Health check passed — semua container running"
          EOF

      # ── 9. Notifikasi sukses / gagal ─────────────────────────────────────
      - name: Notify deploy status
        if: always()
        run: |
          STATUS="${{ job.status }}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          ACTOR="${{ github.actor }}"
          BRANCH="${{ github.ref_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$STATUS" = "success" ]; then
            ICON="✅"
            TEXT="Deploy BERHASIL"
          else
            ICON="❌"
            TEXT="Deploy GAGAL"
          fi

          echo "$ICON $TEXT"
          echo "Branch  : $BRANCH"
          echo "By      : $ACTOR"
          echo "Commit  : $COMMIT_MSG"
          echo "Detail  : $RUN_URL"

          # Uncomment jika ingin kirim notifikasi Telegram:
          # curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          #   -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          #   -d text="$ICON Rekrutmen Deploy\n\n$TEXT\nBranch: $BRANCH\nBy: $ACTOR\nCommit: $COMMIT_MSG\nDetail: $RUN_URL" \
          #   -d parse_mode="HTML"
