name: rekrutmen
services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ${PROJECT_NAME}-nginx
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./src/rekrutmen:/var/www/html/rekrutmen
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dataupload:/var/www/html/rekrutmen/dataupload
    depends_on:
      - app74
    networks:
      - appnet

  app74:
    build:
      context: .
      dockerfile: ./docker/php74/Dockerfile
    image: ${PROJECT_NAME}-php74
    container_name: ${PROJECT_NAME}-php74
    working_dir: /var/www/html/rekrutmen
    volumes:
      - ./src/rekrutmen:/var/www/html/rekrutmen
      - ./docker/php74/php.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
    environment:
      TZ: ${TZ}
      CI_ENV: ${CI_ENV}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      DB_HOST_1: ${DB_HOST_1}
      DB_PORT_1: ${DB_PORT_1}
      DB_USER_1: ${DB_USER_1}
      DB_PASS_1: ${DB_PASS_1}
      DB_NAME_1: ${DB_NAME_1}
