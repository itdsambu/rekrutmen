      - appnet

  app83:
    build:
      context: .
      dockerfile: ./docker/php83/Dockerfile
    image: ${PROJECT_NAME}-app83
    container_name: ${PROJECT_NAME}-php83
    working_dir: /var/www/html/rekrutmen
