server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html;
    client_max_body_size 50M;
    server_tokens off;
    autoindex off;

    client_body_timeout 120s;
    client_header_timeout 60s;
    send_timeout 120s;
    keepalive_timeout 65s;

    access_log /dev/stdout rekrutmen_log;
    error_log /dev/stderr warn;

    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    fastcgi_hide_header X-Powered-By;

    location = / {
        return 301 /rekrutmen/;
    }
    location = /rekrutmen {
        return 301 /rekrutmen/;
    }

    location = /rekrutmen/composer.json      { return 403; }
    location = /rekrutmen/composer.lock      { return 403; }
    location = /rekrutmen/Dockerfile         { return 403; }
    location = /rekrutmen/license.txt        { return 403; }
    location = /rekrutmen/readme.rst         { return 403; }
    location = /rekrutmen/contributing.md    { return 403; }
    location = /rekrutmen/phpinfo.php        { return 403; }
    location ~ "^/rekrutmen/index copy\.php$" { return 403; }

    location ~ /\.(?!well-known) {
        return 403;
    }

    location ^~ /rekrutmen/application/ { return 403; }
    location ^~ /rekrutmen/system/      { return 403; }
    location ^~ /rekrutmen/vendor/      { return 403; }
    location ^~ /rekrutmen/backup/      { return 403; }
    location ^~ /rekrutmen/.vscode/     { return 403; }

    location ~* ^/rekrutmen/.*\.(env|log|sql|bak|ini|conf|dist|sh|yml|yaml|md|rst|txt|lnk)$ {
        return 403;
    }

    location ^~ /rekrutmen/dataupload/berkas/ {
        alias /media/forqsd/rekrutmen/berkas/;
        try_files $uri =404;
    }
    location ^~ /rekrutmen/dataupload/bypass/ {
        alias /media/forqsd/rekrutmen/bypass/;
        try_files $uri =404;
    }
    location ^~ /rekrutmen/dataupload/calonkandidat/ {
        alias /media/forqsd/rekrutmen/calonkandidat/;
        try_files $uri =404;
    }
    location ^~ /rekrutmen/dataupload/foto/ {
        alias /media/forqsd/rekrutmen/foto/;
        try_files $uri =404;
    }
    location ^~ /rekrutmen/dataupload/fotoProfil/ {
        alias /media/forqsd/rekrutmen/fotoProfil/;
        try_files $uri =404;
    }
    location ^~ /rekrutmen/dataupload/idealkarytk/ {
        alias /media/forqsd/rekrutmen/idealkarytk/;
        try_files $uri =404;
    }
    location ^~ /rekrutmen/dataupload/ttd/ {
        alias /media/forqsd/rekrutmen/ttd/;
        try_files $uri =404;
    }
    location ^~ /rekrutmen/dataupload/ttdbynik/ {
        alias /media/forqsd/rekrutmen/ttdbynik/;
        try_files $uri =404;
    }
    location ^~ /rekrutmen/dataupload/ttdpgd/ {
        alias /media/forqsd/rekrutmen/ttdpgd/;
        try_files $uri =404;
    }
    location ^~ /rekrutmen/dataupload/datakar/ {
        alias /media/foto_kar/;
        try_files $uri =404;
    }

    location ~* ^/rekrutmen/(assets|new-assets)/.+\.(css|js|jpg|jpeg|png|gif|svg|ico|webp|woff|woff2|ttf|eot|map)$ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location = /rekrutmen/index.php {
        include fastcgi_params;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass app83:9000;
        fastcgi_hide_header X-Powered-By;

        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout    180s;
        fastcgi_read_timeout    180s;

        fastcgi_buffers           16 32k;
        fastcgi_buffer_size       64k;
        fastcgi_busy_buffers_size 128k;
        fastcgi_temp_file_write_size 256k;

        fastcgi_ignore_client_abort on;
        fastcgi_keep_conn on;
    }

    location ~* ^/rekrutmen/.*\.php$ {
        return 403;
    }

    location /rekrutmen/ {
        try_files $uri $uri/ /rekrutmen/index.php?$query_string;
    }
}