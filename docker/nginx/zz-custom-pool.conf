[www]
user = www-data
group = www-data
pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 500

; ⬇ Tambahkan/sesuaikan ini
slowlog = /proc/self/fd/2
request_slowlog_timeout = 10s              ; log request >10s
request_slowlog_trace_depth = 30           ; ← TAMBAHKAN, biar trace lengkap

request_terminate_timeout = 300s

; ⬇ Tambahkan FPM status & ping
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; ⬇ Listen backlog
listen.backlog = 512

catch_workers_output = yes
clear_env = no
decorate_workers_output = no
