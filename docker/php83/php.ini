; ============================================
; Memory Limit
; 512M cukup untuk export Excel ribuan baris
; dan bulk import data
; ============================================
memory_limit = 512M

; ============================================
; Upload PDF/berkas CV
; ============================================
upload_max_filesize = 50M
post_max_size = 100M
max_file_uploads = 20

; ============================================
; Execution time untuk bulk operations
; ============================================
max_execution_time = 120
max_input_time = 120
max_input_vars = 5000

; ============================================
; Session - file-based OK untuk single instance
; Kalau suatu saat scale multi-container, pindah ke Redis
; ============================================
session.gc_maxlifetime = 7200

; ============================================
; OPcache - WAJIB untuk performance
; ============================================
opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 60
opcache.validate_timestamps = 1
opcache.save_comments = 1
opcache.enable_file_override = 0
opcache.fast_shutdown = 1

; ============================================
; Realpath cache - speed up file access
; (penting karena kamu banyak mount ke /media/forqsd)
; ============================================
realpath_cache_size = 4096k
realpath_cache_ttl = 600

; ============================================
; Error handling
; ============================================
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
log_errors = On
error_log = /proc/self/fd/2

; ============================================
; Timezone
; ============================================
date.timezone = Asia/Jakarta
