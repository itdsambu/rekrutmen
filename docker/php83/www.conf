[www]
user = www-data
group = www-data

pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 500

; Slow log untuk monitoring
slowlog = /proc/self/fd/2
request_slowlog_timeout = 5s

; Timeout kill worker kalau stuck
request_terminate_timeout = 180s

catch_workers_output = yes
