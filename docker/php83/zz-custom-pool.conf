[www]
; ============================================
; PHP-FPM Process Manager Configuration
; Container RAM aman (31 GiB available, usage ~72MB)
; ============================================

pm = dynamic
pm.max_children = 80
pm.start_servers = 15
pm.min_spare_servers = 10
pm.max_spare_servers = 25
pm.max_requests = 300

; ============================================
; Process idle timeout - recycle worker idle > 10 menit
; Mencegah memory bloat dari worker lama
; ============================================
pm.process_idle_timeout = 10s

; ============================================
; Slowlog - capture request > 5 detik
; Output ke stderr supaya muncul di docker logs
; ============================================
request_slowlog_timeout = 5s
slowlog = /proc/self/fd/2
request_slowlog_trace_depth = 20

; ============================================
; Request timeout - kill request > 60 detik
; ============================================
request_terminate_timeout = 120s

; ============================================
; Status & Health Check endpoints
; ============================================
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; ============================================
; Error output - kirim ke stderr (docker logs)
; ============================================
catch_workers_output = yes
decorate_workers_output = no

; ============================================
; Clear environment variables - security
; ============================================
clear_env = no

; ============================================
; Backlog socket listen (default 511 bisa kurang)
; ============================================
listen.backlog = 1024
